name: Bug report
description: Report a reproducible V1, V2, documentation, or validation defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [V1 skill, V1 validator, V2 application, Documentation, CI or release]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the exact command or browser actions and the smallest safe package or screenshot when relevant.
      placeholder: "1. npm ci\n2. ..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, Node version, browser version, and V2 candidate SHA when relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Paste complete error output and remove secrets or private world data.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Evidence safety
      options:
        - label: I removed credentials and private world material from the attached evidence.
          required: true
