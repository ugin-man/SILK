items:
  - id: hypothesis.ember-memory
    level: 0
    phase: spin
    target: compact maritime premise
    proposal: A local tide records heat for one cycle and sheds harvestable glass.
    verdict: accepted_and_rescoped
    reason: Preserves tactile wonder while the one-cycle decay prevents a universal energy economy.
  - id: hypothesis.furnace-crown
    level: 0
    phase: spin
    target: heat-glass governance
    proposal: The Furnace Crown is a single order controlling all heat glass.
    verdict: rejected
    reason: Premise convergence; it would combine material access, civic rule, trade, origin knowledge, and regional authority in one institution.
  - id: hypothesis.rain-vault
    level: 1
    phase: spin
    target: independent historical root
    proposal: An inland rain archive predates and does not participate in coastal glass harvesting.
    verdict: accepted
    reason: Adds verifiable history outside the central premise without becoming random texture.
