items:
  - pattern: Every institution derives authority from Ember glass.
    status: avoided
    evidence: Cooling houses derive narrow authority from neighborhood contribution; the Rain Vault has a separate practice.
  - pattern: Every route transports the signature material.
    status: avoided
    evidence: The Pale Current imports staples and people but cannot preserve Ember glass.
  - pattern: Every subject contains a hidden crisis.
    status: avoided
    evidence: The Pale Current and Rain Vault are stable, competent structures with ordinary failure modes.
  - pattern: Shared memory language implies shared ontology.
    status: prohibited
    evidence: Rain records and heat memory remain explicitly unrelated.
